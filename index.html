<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Brønsted-Säure-Base-Reaktionen</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }
        
        .game-container {
            background-color: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            max-height: 95vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin: 5px 0 20px 0;
            font-size: clamp(22px, 5vw, 28px);
        }
        
        .reaction-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 25px;
        }
        
        .reaction-btn {
            padding: 12px 16px;
            border: none;
            border-radius: 30px;
            background-color: #f0f0f0;
            cursor: pointer;
            font-size: clamp(13px, 3.5vw, 15px);
            transition: all 0.2s;
            min-width: 70px;
            touch-action: manipulation;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: 500;
        }
        
        .reaction-btn.active {
            background-color: #667eea;
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .instruction {
            background: linear-gradient(145deg, #f0f4ff, #e6ecff);
            padding: 15px 20px;
            border-radius: 40px;
            width: 100%;
            text-align: center;
            font-size: clamp(15px, 4vw, 17px);
            color: #2c3e50;
            font-weight: 500;
            border: 2px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .molecules {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            gap: 15px;
            margin: 10px 0;
        }
        
        /* Für Smartphones: Vertikale Anordnung */
        @media (max-width: 600px) {
            .molecules {
                flex-direction: column;
                gap: 5px;
            }
            
            .arrow {
                transform: rotate(90deg);
                margin: 5px 0;
            }
        }
        
        .molecule-wrapper {
            flex: 1;
            min-width: 160px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .bubble {
            display: flex;
            align-items: center;
            justify-content: center;
            width: min(180px, 40vw);
            height: min(180px, 40vw);
            border-radius: 50%;
            background: linear-gradient(145deg, #ffffff, #f5f5f5);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            font-size: clamp(20px, 6vw, 28px);
            font-weight: bold;
            margin: 10px auto;
            position: relative;
            transition: all 0.3s ease;
            border: 4px solid #fff;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Für Smartphones: Feste Größe für bessere Ausrichtung */
        @media (max-width: 600px) {
            .bubble {
                width: 160px;
                height: 160px;
                font-size: 24px;
                margin: 5px auto;
            }
            
            .molecule-wrapper {
                min-width: unset;
                width: 100%;
            }
        }
        
        /* Für sehr kleine Smartphones */
        @media (max-width: 380px) {
            .bubble {
                width: 140px;
                height: 140px;
                font-size: 20px;
            }
        }
        
        .bubble.acid-bubble {
            animation: pulse 2s infinite;
            border-color: #667eea;
        }
        
        .bubble.base-highlight {
            border-color: #4CAF50;
            box-shadow: 0 0 25px #4CAF50;
            transform: scale(1.02);
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(102, 126, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0); }
        }
        
        .arrow {
            font-size: clamp(35px, 8vw, 50px);
            color: #666;
            margin: 0 5px;
            font-weight: 300;
            transition: transform 0.3s ease;
        }
        
        .h-plus {
            position: fixed;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff6b6b, #ff3838);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 32px;
            box-shadow: 0 8px 30px rgba(255,56,56,0.7);
            z-index: 10000;
            pointer-events: none;
            transform: translate(-50%, -50%);
            border: 5px solid white;
            touch-action: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-top: -60px;
        }
        
        .message {
            text-align: center;
            font-size: clamp(15px, 4vw, 18px);
            color: #333;
            min-height: 70px;
            padding: 15px 20px;
            background-color: #ffffff;
            border-radius: 25px;
            width: 100%;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            line-height: 1.4;
            margin: 10px 0;
        }
        
        .reaction-equation {
            font-size: clamp(18px, 5vw, 24px);
            font-weight: bold;
            color: #1e3c72;
            padding: 20px;
            background: linear-gradient(145deg, #bbdefb, #90caf9);
            border-radius: 50px;
            width: 100%;
            text-align: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            border: 3px solid white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            margin: 10px 0;
        }
        
        .reaction-equation.show {
            opacity: 1;
        }
        
        .footer {
            width: 100%;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-top: 2px solid #e0e0e0;
            font-size: clamp(13px, 3.5vw, 16px);
            color: #666;
            font-weight: 500;
        }
        
        .reset-btn {
            padding: 16px 35px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(145deg, #667eea, #5a67d8);
            color: white;
            font-size: clamp(16px, 4vw, 19px);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            width: 100%;
            max-width: 300px;
            margin: 5px auto;
            border: 3px solid white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
        
        .reset-btn:active {
            transform: scale(0.95);
        }
        
        /* Spezielle Anpassungen für die vertikale Ansicht */
        @media (max-width: 600px) {
            .h-plus {
                width: 75px;
                height: 75px;
                font-size: 28px;
                border-width: 4px;
                margin-top: -50px;
            }
            
            .game-area {
                gap: 10px;
            }
            
            .message {
                min-height: 60px;
                padding: 12px 15px;
            }
            
            .reaction-equation {
                padding: 15px;
            }
        }

        @media (max-width: 380px) {
            .h-plus {
                width: 65px;
                height: 65px;
                font-size: 24px;
                margin-top: -45px;
            }
            
            .bubble {
                width: 130px;
                height: 130px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧪 Brønsted-Säure-Base-Reaktionen 🧪</h1>
        
        <div class="reaction-selector">
            <button class="reaction-btn active" data-reaction="hcl-h2o">HCl + H₂O</button>
            <button class="reaction-btn" data-reaction="nh3-h2o">NH₃ + H₂O</button>
            <button class="reaction-btn" data-reaction="hcl-oh">HCl + OH⁻</button>
            <button class="reaction-btn" data-reaction="hco3-h3o">HCO₃⁻ + H₃O⁺</button>
            <button class="reaction-btn" data-reaction="hno3-h2o">HNO₃ + H₂O</button>
            <button class="reaction-btn" data-reaction="ch3cooh-h2o">CH₃COOH + H₂O</button>
            <button class="reaction-btn" data-reaction="ch3coo-h3o">CH₃COO⁻ + H₃O⁺</button>
            <button class="reaction-btn" data-reaction="h2so4-h2o">H₂SO₄ + H₂O</button>
            <button class="reaction-btn" data-reaction="h3o-oh">H₃O⁺ + OH⁻</button>
        </div>

        <div class="game-area">
            <div class="instruction" id="instruction">
                Tippe auf das Molekül, das du für die Säure (H⁺-Donator) hältst
            </div>

            <div class="molecules">
                <div class="molecule-wrapper" id="molecule1"></div>
                <div class="arrow">➕</div>
                <div class="molecule-wrapper" id="molecule2"></div>
            </div>

            <div class="message" id="message">
                Wähle eine Reaktion oder tippe auf ein Molekül
            </div>

            <div class="reaction-equation" id="equation"></div>

            <button class="reset-btn" onclick="resetGame()">Neustart</button>
            
            <div class="footer">
                Copyright © 2026 Dr. P. Kiliszek
            </div>
        </div>
    </div>

    <script>
        const reactions = {
            'hcl-h2o': {
                acid: { formula: 'HCl', conjugate: 'Cl⁻' },
                base: { formula: 'H₂O', conjugate: 'H₃O⁺' },
                equation: 'HCl + H₂O → Cl⁻ + H₃O⁺'
            },
            'nh3-h2o': {
                acid: { formula: 'H₂O', conjugate: 'OH⁻' },
                base: { formula: 'NH₃', conjugate: 'NH₄⁺' },
                equation: 'NH₃ + H₂O → NH₄⁺ + OH⁻'
            },
            'hcl-oh': {
                acid: { formula: 'HCl', conjugate: 'Cl⁻' },
                base: { formula: 'OH⁻', conjugate: 'H₂O' },
                equation: 'HCl + OH⁻ → Cl⁻ + H₂O'
            },
            'hco3-h3o': {
                acid: { formula: 'H₃O⁺', conjugate: 'H₂O' },
                base: { formula: 'HCO₃⁻', conjugate: 'H₂CO₃' },
                equation: 'HCO₃⁻ + H₃O⁺ → H₂CO₃ + H₂O'
            },
            'hno3-h2o': {
                acid: { formula: 'HNO₃', conjugate: 'NO₃⁻' },
                base: { formula: 'H₂O', conjugate: 'H₃O⁺' },
                equation: 'HNO₃ + H₂O → NO₃⁻ + H₃O⁺'
            },
            'ch3cooh-h2o': {
                acid: { formula: 'CH₃COOH', conjugate: 'CH₃COO⁻' },
                base: { formula: 'H₂O', conjugate: 'H₃O⁺' },
                equation: 'CH₃COOH + H₂O → CH₃COO⁻ + H₃O⁺'
            },
            'ch3coo-h3o': {
                acid: { formula: 'H₃O⁺', conjugate: 'H₂O' },
                base: { formula: 'CH₃COO⁻', conjugate: 'CH₃COOH' },
                equation: 'CH₃COO⁻ + H₃O⁺ → CH₃COOH + H₂O'
            },
            'h2so4-h2o': {
                acid: { formula: 'H₂SO₄', conjugate: 'HSO₄⁻' },
                base: { formula: 'H₂O', conjugate: 'H₃O⁺' },
                equation: 'H₂SO₄ + H₂O → HSO₄⁻ + H₃O⁺'
            },
            'h3o-oh': {
                acid: { formula: 'H₃O⁺', conjugate: 'H₂O' },
                base: { formula: 'OH⁻', conjugate: 'H₂O' },
                equation: 'H₃O⁺ + OH⁻ → H₂O + H₂O'
            }
        };

        let currentReaction = 'hcl-h2o';
        let dragging = false;
        let hPlusElement = null;
        let acidElement = null;
        let baseElement = null;
        let gameActive = true;

        function initGame() {
            const reaction = reactions[currentReaction];
            const mol1 = document.getElementById('molecule1');
            const mol2 = document.getElementById('molecule2');

            // Zeige beide Moleküle
            mol1.innerHTML = createMoleculeHTML(reaction.acid.formula);
            mol2.innerHTML = createMoleculeHTML(reaction.base.formula);
            
            // Speichere, welches Molekül die Säure ist
            if (reaction.acid.formula === 'HCl' || 
                reaction.acid.formula === 'HNO₃' || 
                reaction.acid.formula === 'CH₃COOH' || 
                reaction.acid.formula === 'H₂SO₄' ||
                reaction.acid.formula === 'H₃O⁺' || 
                (reaction.acid.formula === 'H₂O' && currentReaction === 'nh3-h2o')) {
                acidElement = mol1;
                baseElement = mol2;
            } else {
                acidElement = mol2;
                baseElement = mol1;
            }
            
            // Reset
            document.getElementById('equation').classList.remove('show');
            document.getElementById('equation').textContent = '';
            document.getElementById('message').innerHTML = 'Tippe auf das Molekül, das du für die Säure (H⁺-Donator) hältst';
            document.getElementById('instruction').innerHTML = '🤔 Finde die Säure - tippe sie an!';
            
            gameActive = true;
            dragging = false;
            if (hPlusElement) {
                hPlusElement.remove();
                hPlusElement = null;
            }
        }

        function createMoleculeHTML(formula) {
            return `
                <div class="bubble" onclick="handleMoleculeClick(this, '${formula}')" ontouchstart="handleMoleculeTouch(event, this, '${formula}')">
                    ${formula}
                </div>
            `;
        }

        function handleMoleculeClick(element, formula) {
            if (!gameActive || dragging) return;
            
            const moleculeWrapper = element.closest('.molecule-wrapper');
            
            // Prüfe ob das angeklickte Molekül die Säure ist
            const isAcid = (moleculeWrapper === acidElement);
            
            if (isAcid) {
                // Richtige Säure - starte den Protonentransfer
                element.classList.add('acid-bubble');
                document.getElementById('message').innerHTML = '✅ Richtig! Jetzt ziehe das H⁺ zur Base';
                document.getElementById('instruction').innerHTML = '👆 Ziehe das H⁺ zur anderen Blase';
                
                // Entferne den normalen Click-Handler und füge den speziellen für's Ziehen hinzu
                element.removeEventListener('click', handleMoleculeClick);
                element.addEventListener('click', startDragging);
                element.addEventListener('touchstart', startDraggingTouch, { passive: false });
            } else {
                // Falsches Molekül
                element.classList.add('base-highlight');
                document.getElementById('message').innerHTML = '❌ Das ist nicht die Säure. Versuche es mit dem anderen Molekül!';
                document.getElementById('instruction').innerHTML = '💡 Die Säure gibt H⁺ ab, die Base nimmt H⁺ auf';
                
                setTimeout(() => {
                    element.classList.remove('base-highlight');
                }, 800);
            }
        }

        function handleMoleculeTouch(event, element, formula) {
            event.preventDefault();
            handleMoleculeClick(element, formula);
        }

        function startDragging(e) {
            e.preventDefault();
            if (!gameActive || dragging) return;
            
            const acidBubble = acidElement.querySelector('.bubble');
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            dragging = true;
            
            // Ändere die Säure zu ihrer konjugierten Base
            const reaction = reactions[currentReaction];
            const conjugateBase = acidElement === document.getElementById('molecule1') ? 
                reaction.acid.conjugate : reaction.base.conjugate;
            acidBubble.innerHTML = conjugateBase;
            
            // Erstelle H⁺ Element
            hPlusElement = document.createElement('div');
            hPlusElement.className = 'h-plus';
            hPlusElement.textContent = 'H⁺';
            hPlusElement.style.left = clientX + 'px';
            hPlusElement.style.top = clientY + 'px';
            document.body.appendChild(hPlusElement);

            // Hebe die Base hervor
            const baseBubble = baseElement.querySelector('.bubble');
            baseBubble.classList.add('base-highlight');

            document.getElementById('instruction').innerHTML = '👆 Ziehe H⁺ zur Base!';
            document.getElementById('message').innerHTML = 'Ziehe das Proton auf die andere Blase';

            function onMove(e) {
                e.preventDefault();
                if (hPlusElement) {
                    const moveX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                    const moveY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                    
                    if (moveX && moveY) {
                        hPlusElement.style.left = moveX + 'px';
                        hPlusElement.style.top = moveY + 'px';
                    }
                }
            }

            function onEnd(e) {
                e.preventDefault();
                if (!hPlusElement) return;

                const baseBubble = baseElement.querySelector('.bubble');
                const baseRect = baseBubble.getBoundingClientRect();
                
                const endX = e.clientX || (e.changedTouches ? e.changedTouches[0].clientX : 0);
                const endY = e.clientY || (e.changedTouches ? e.changedTouches[0].clientY : 0);
                
                // Prüfe ob über der Base losgelassen
                if (endX >= baseRect.left && endX <= baseRect.right &&
                    endY >= baseRect.top && endY <= baseRect.bottom) {
                    
                    // Erfolg - Base ändern
                    const conjugateAcid = baseElement === document.getElementById('molecule1') ? 
                        reaction.acid.conjugate : reaction.base.conjugate;
                    baseBubble.innerHTML = conjugateAcid;
                    
                    // Zeige Gleichung
                    document.getElementById('equation').textContent = reaction.equation;
                    document.getElementById('equation').classList.add('show');
                    
                    document.getElementById('message').innerHTML = '🎉 Super! Die Reaktion ist korrekt!';
                    document.getElementById('instruction').innerHTML = '✅ Reaktion erfolgreich!';
                    
                    gameActive = false;
                } else {
                    // Fehlschlag
                    document.getElementById('message').innerHTML = '❌ Das H⁺ muss zur Base! Versuche es nochmal.';
                    resetGame();
                }

                // Aufräumen
                if (hPlusElement) {
                    hPlusElement.remove();
                    hPlusElement = null;
                }
                baseBubble.classList.remove('base-highlight');
                dragging = false;
                
                removeListeners();
            }

            function removeListeners() {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
                document.removeEventListener('touchcancel', onEnd);
            }

            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
            document.addEventListener('touchcancel', onEnd);
        }

        function startDraggingTouch(e) {
            e.preventDefault();
            startDragging(e);
        }

        function resetGame() {
            if (hPlusElement) {
                hPlusElement.remove();
                hPlusElement = null;
            }
            dragging = false;
            gameActive = true;
            initGame();
        }

        // Event-Listener für Reaktionsauswahl
        document.querySelectorAll('.reaction-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.reaction-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentReaction = this.dataset.reaction;
                resetGame();
            });
            
            btn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                document.querySelectorAll('.reaction-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentReaction = this.dataset.reaction;
                resetGame();
            }, { passive: false });
        });

        // Verhindere Scrollen während des Ziehens
        document.body.addEventListener('touchmove', function(e) {
            if (dragging) {
                e.preventDefault();
            }
        }, { passive: false });

        // Spiel starten
        initGame();
    </script>
</body>
</html>
